{% extends "base.html" %}
{% block title %}Resort Map &mdash; Where Shall We Ski{% endblock %}
{% block head %}
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
  .map-page { display: flex; flex-direction: column; height: calc(100vh - 65px); }
  .map-header { padding: 1rem 2rem 0.75rem; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
  .map-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--alpine);
    letter-spacing: 0.04em;
    margin: 0;
    border-left: 4px solid var(--accent);
    padding-left: 0.6rem;
  }
  .map-count { font-size: 0.85rem; color: var(--text-muted); }
  #map { flex: 1; min-height: 0; }
  .mapboxgl-popup-content {
    background: #162436;
    color: #e8edf2;
    border: 1px solid rgba(192,57,43,0.35);
    border-radius: 6px;
    padding: 0.75rem 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    font-family: 'Inter', sans-serif;
    min-width: 180px;
    max-width: 240px;
  }
  .mapboxgl-popup-tip { border-top-color: #162436 !important; }
  .popup-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.15rem;
    color: #f0f4f8;
    letter-spacing: 0.03em;
    margin: 0 0 0.2rem;
    line-height: 1.2;
  }
  .popup-location { font-size: 0.78rem; color: #8fa6bb; margin: 0 0 0.4rem; }
  .popup-snow { display: inline-block; background: var(--accent); color: white; font-weight: 700; font-size: 0.72rem; padding: 0.15rem 0.45rem; border-radius: 4px; margin-bottom: 0.4rem; }
  .popup-link { display: inline-block; font-size: 0.78rem; color: #e74c3c; font-weight: 600; text-decoration: none; }
  .popup-link:hover { color: #f0f4f8; text-decoration: underline; }
  .mapboxgl-ctrl-attrib { font-size: 0.65rem; }
</style>
{% endblock %}
{% block content %}
<div class="map-page">
  <div class="map-header">
    <h1 class="map-title">Ski Resort Map</h1>
    <span class="map-count" id="resort-count"></span>
  </div>
  <div id="map"></div>
</div>
<script>
mapboxgl.accessToken = '{{ mapbox_token }}';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/outdoors-v12',
  center: [-89.5, 45.5],
  zoom: 5,
});

map.addControl(new mapboxgl.NavigationControl(), 'top-right');
map.addControl(new mapboxgl.FullscreenControl(), 'top-right');

const venues = {{ venues | tojson }};

document.getElementById('resort-count').textContent =
  venues.length + ' resort' + (venues.length !== 1 ? 's' : '');

const popupEl = new mapboxgl.Popup({ closeButton: true, closeOnClick: false, maxWidth: '260px' });

map.on('load', () => {
  const features = venues
    .filter(v => v.lat != null && v.lng != null)
    .map(v => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [parseFloat(v.lng), parseFloat(v.lat)] },
      properties: {
        slug: v.slug,
        name: v.name,
        city: v.city,
        state: v.state,
        snow_depth_in: v.snow_depth_in ?? null,
      }
    }));

  map.addSource('resorts', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features },
    cluster: true,
    clusterMaxZoom: 10,
    clusterRadius: 35,
  });

  map.addLayer({
    id: 'clusters',
    type: 'circle',
    source: 'resorts',
    filter: ['has', 'point_count'],
    paint: {
      'circle-color': '#c0392b',
      'circle-radius': ['step', ['get', 'point_count'], 18, 5, 24, 10, 30],
      'circle-opacity': 0.9,
    }
  });

  map.addLayer({
    id: 'cluster-count',
    type: 'symbol',
    source: 'resorts',
    filter: ['has', 'point_count'],
    layout: {
      'text-field': '{point_count_abbreviated}',
      'text-size': 12,
      'text-font': ['DIN Offc Pro Bold', 'Arial Unicode MS Bold'],
    },
    paint: { 'text-color': '#ffffff' }
  });

  map.addLayer({
    id: 'unclustered',
    type: 'circle',
    source: 'resorts',
    filter: ['!', ['has', 'point_count']],
    paint: {
      'circle-color': '#c0392b',
      'circle-radius': 9,
      'circle-stroke-width': 2,
      'circle-stroke-color': '#0d1b2a',
    }
  });

  map.on('click', 'unclustered', (e) => {
    const p = e.features[0].properties;
    const coords = e.features[0].geometry.coordinates.slice();
    const loc = [p.city, p.state].filter(Boolean).join(', ');
    const snowHtml = p.snow_depth_in
      ? `<span class="popup-snow">${p.snow_depth_in}" snow</span><br>`
      : '';

    popupEl
      .setLngLat(coords)
      .setHTML(
        `<p class="popup-name">${p.name}</p>` +
        (loc ? `<p class="popup-location">${loc}</p>` : '') +
        snowHtml +
        `<a class="popup-link" href="/venue/${p.slug}">View resort &rarr;</a>`
      )
      .addTo(map);
  });

  map.on('click', 'clusters', (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
    const clusterId = features[0].properties.cluster_id;
    map.getSource('resorts').getClusterExpansionZoom(clusterId, (err, zoom) => {
      if (err) return;
      map.easeTo({ center: features[0].geometry.coordinates, zoom });
    });
  });

  map.on('mouseenter', 'unclustered', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'unclustered', () => { map.getCanvas().style.cursor = ''; });
  map.on('mouseenter', 'clusters', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'clusters', () => { map.getCanvas().style.cursor = ''; });

  if (features.length > 0) {
    const bounds = new mapboxgl.LngLatBounds();
    features.forEach(f => bounds.extend(f.geometry.coordinates));
    map.fitBounds(bounds, { padding: 60, maxZoom: 10, animate: false });
  }
});
</script>
{% endblock %}
